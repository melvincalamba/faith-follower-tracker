version: '3.8'

services:

  db:
      image: postgres:15
      container_name: fft_db
      restart: always
      environment:
        POSTGRES_USER:     postgres
        POSTGRES_PASSWORD: 1120melvin
        POSTGRES_DB:       faith_follower_db
      ports:
        - "5433:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./database:/docker-entrypoint-initdb.d
      networks:
        - fft_network
      healthcheck:
        test:     ["CMD-SHELL", "pg_isready -U postgres -d faith_follower_db"]
        interval: 5s
        timeout:  5s
        retries:  10

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile.prod
    container_name: fft_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    # ← Hintayin ang DB na maging healthy bago mag-start
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fft_network

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile.prod
    container_name: fft_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fft_network

volumes:
  postgres_data:

networks:
  fft_network:
    driver: bridge